<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Log viewer — file</title>
    <script>
      (function () {
        var k = "log-viewer-theme";
        var ok = { light: 1, dark: 1, blue: 1 };
        var d = "light";
        try {
          var s = localStorage.getItem(k);
          if (s && ok[s]) d = s;
        } catch (e) {}
        document.documentElement.setAttribute("data-theme", d);
        document.documentElement.style.colorScheme =
          d === "dark" ? "dark" : "light";
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body class="page-view">
    <header class="app-header app-header--view">
      <div class="app-header__top">
        <div class="app-header__brand">
          <div class="view-header-row">
            <a class="back-link" href="index.html">← Back to list</a>
            <h1 class="view-title" id="view-title">Log file</h1>
          </div>
          <p class="meta" id="file-meta" hidden></p>
        </div>
        <div class="theme-switcher" role="group" aria-label="Color theme">
          <button
            type="button"
            class="theme-switcher__btn"
            data-theme-choice="light"
            aria-pressed="false"
          >
            Light
          </button>
          <button
            type="button"
            class="theme-switcher__btn"
            data-theme-choice="dark"
            aria-pressed="false"
          >
            Dark
          </button>
          <button
            type="button"
            class="theme-switcher__btn"
            data-theme-choice="blue"
            aria-pressed="false"
          >
            Blue
          </button>
        </div>
      </div>
    </header>
    <main class="viewer viewer-full">
      <pre id="log-content" class="log-content" aria-live="polite">Loading…</pre>
    </main>
    <p class="error" id="error-banner" hidden role="alert"></p>
    <script src="js/theme.js"></script>
    <script src="js/view.js"></script>
  </body>
</html>
