<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>log-viewer</title>
    <script>
      (function () {
        var k = "log-viewer-theme";
        var ok = { light: 1, dark: 1, blue: 1 };
        var d = "light";
        try {
          var s = localStorage.getItem(k);
          if (s && ok[s]) d = s;
        } catch (e) {}
        document.documentElement.setAttribute("data-theme", d);
        document.documentElement.style.colorScheme =
          d === "dark" ? "dark" : "light";
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="app-header__top">
        <div class="app-header__brand">
          <h1>Log viewer</h1>
          <p class="meta" id="log-root" hidden></p>
        </div>
        <div class="theme-switcher" role="group" aria-label="Color theme">
          <button
            type="button"
            class="theme-switcher__btn"
            data-theme-choice="light"
            aria-pressed="false"
          >
            Light
          </button>
          <button
            type="button"
            class="theme-switcher__btn"
            data-theme-choice="dark"
            aria-pressed="false"
          >
            Dark
          </button>
          <button
            type="button"
            class="theme-switcher__btn"
            data-theme-choice="blue"
            aria-pressed="false"
          >
            Blue
          </button>
        </div>
      </div>
    </header>
    <main class="layout layout-index">
      <aside class="sidebar sidebar-wide">
        <h2 class="sidebar-title">Log files</h2>
        <div class="legend-block" id="legend" hidden>
          <p class="hint legend-hint">
            <span class="legend-item"
              ><span class="issue-badge issue-badge--error" role="img" aria-label="Errors"
                >🚨</span
              >
              errors (count)</span
            >
            <span class="legend-item"
              ><span class="issue-badge issue-badge--warning" role="img" aria-label="Warnings"
                >⚠️</span
              >
              warnings (count)</span
            >
          </p>
        </div>
        <ul class="log-list" id="log-list" aria-label="Log files"></ul>
        <p class="hint empty-hint" id="list-empty" hidden>
          No log files in this directory.
        </p>
      </aside>
      <section class="timeline-pane" aria-label="Log timeline">
        <header class="timeline-header">
          <div class="timeline-header__row">
            <div class="timeline-header__titles">
              <h2 class="timeline-title" id="timeline-title">Timeline</h2>
              <p class="timeline-meta" id="timeline-meta" hidden></p>
            </div>
            <div class="ai-analyze-toolbar" id="ai-analyze-toolbar" hidden>
              <span class="ai-analyze-toolbar__label" id="ai-analyze-label"
                >AI 分析</span
              >
              <div class="ai-analyze-toolbar__controls">
                <select
                  id="ai-preset-select"
                  class="ai-analyze-toolbar__select"
                  aria-labelledby="ai-analyze-label"
                ></select>
                <button
                  type="button"
                  id="ai-analyze-run"
                  class="ai-analyze-toolbar__run"
                >
                  运行
                </button>
              </div>
            </div>
          </div>
        </header>
        <div class="ai-analyze-result" id="ai-analyze-result" hidden>
          <div class="ai-analyze-result__bar">
            <span class="ai-analyze-result__title">分析结果</span>
            <button
              type="button"
              class="ai-analyze-result__close"
              id="ai-analyze-close"
              aria-label="Close analysis panel"
            >
              ×
            </button>
          </div>
          <pre
            class="ai-analyze-result__body"
            id="ai-analyze-result-body"
          ></pre>
        </div>
        <p class="timeline-placeholder" id="timeline-placeholder">
          Select a log file in the list to preview its timeline here. Newest
          lines appear at the top.
        </p>
        <div class="timeline-chart" id="timeline-chart" hidden></div>
      </section>
    </main>
    <p class="error" id="error-banner" hidden role="alert"></p>
    <script src="js/theme.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
